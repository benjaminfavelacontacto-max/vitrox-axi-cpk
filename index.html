<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Vitrox CPK - AXI Final</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --text: #ffffff; --sec: #8e8e93;
            --blue: #0a84ff; --green: #30d158; --red: #ff453a; --border: #38383a;
            --cyan: #64d2ff; --window: #2c2c2e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        /* BARRA SUPERIOR */
        header {
            background: var(--window); padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border);
        }
        .logo-placeholder { background: white; color: black; padding: 4px 8px; border-radius: 4px; font-weight: bold; margin-right: 20px; }
        select, .btn-top {
            background: #3a3a3c; border: none; color: white; padding: 8px 12px; border-radius: 6px; font-size: 14px; margin-right: 10px; cursor: pointer;
        }
        .btn-blue { background: var(--blue); font-weight: 600; }
        .btn-red { background: var(--red); font-weight: 600; }

        /* LAYOUT PRINCIPAL */
        main { display: flex; flex: 1; overflow: hidden; }
        
        /* TABLA IZQUIERDA */
        .sidebar { width: 350px; background: #161617; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { background: rgba(255,255,255,0.05); padding: 8px; font-size: 11px; font-weight: bold; color: var(--sec); text-transform: uppercase; }
        .table-wrapper { overflow-y: auto; flex: 1; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 8px; color: var(--sec); position: sticky; top: 0; background: #161617; }
        td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); }

        /* CONTENIDO DERECHA */
        .content { flex: 1; overflow-y: auto; padding: 20px; background: #000; }
        .stats-row { display: flex; gap: 20px; margin-bottom: 30px; }
        .stats-card { background: var(--card); border-radius: 12px; padding: 16px; flex: 1; border: 1px solid var(--border); }
        .stats-card h3 { margin: 0 0 12px 0; font-size: 16px; color: var(--text); }
        .stat-line { display: flex; justify-content: space-between; font-size: 14px; margin: 8px 0; }
        .stat-line span:first-child { color: var(--sec); }
        .divider { height: 1px; background: var(--border); margin: 10px 0; }
        .status-box { width: 100%; padding: 8px; border-radius: 6px; text-align: center; font-weight: bold; margin-top: 10px; }

        .chart-container { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 25px; border: 1px solid var(--border); height: 300px; }
        
        /* OCULTAR INPUT DE CARPETA */
        #folderInput { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-placeholder">SMT</div>
    <div style="flex: 1"></div>
    <select id="magPicker">
        <option value="highM11">High Mag (M11)</option>
        <option value="lowM15">Low Mag (M15)</option>
        <option value="lowM19">Low Mag (M19)</option>
    </select>
    <button class="btn-top btn-blue" onclick="document.getElementById('folderInput').click()">Cargar Carpeta</button>
    <button class="btn-top btn-red" id="pdfBtn" onclick="exportPDF()" disabled>Descargar PDF</button>
    <input type="file" id="folderInput" webkitdirectory directory multiple>
</header>

<main>
    <div class="sidebar">
        <div class="sidebar-header" id="logCount">LOGS (0)</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>Archivo</th><th>X</th><th>Y</th></tr>
                </thead>
                <tbody id="logTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="content" id="emptyState">
        <div style="text-align: center; margin-top: 200px; color: var(--sec);">
            <h2 style="color: white;">Sin Datos Cargados</h2>
            <p>Selecciona la carpeta de logs de Vitrox para comenzar.</p>
        </div>
    </div>

    <div class="content" id="mainContent" style="display: none;">
        <div class="stats-row">
            <div class="stats-card" id="cardX"></div>
            <div class="stats-card" id="cardY"></div>
            <div class="stats-card" style="max-width: 180px;">
                <h3 style="font-size: 14px;">Criterios</h3>
                <div id="legend"></div>
            </div>
        </div>

        <div class="chart-container"><canvas id="chartX"></canvas></div>
        <div class="chart-container"><canvas id="chartY"></canvas></div>
    </div>
</main>

<script>
    // --- CONFIGURACIÓN DE LÍMITES (Lógica original de la App) ---
    const LIMITS = {
        highM11: { xLSL: 395265829, xUSL: 395542168, yLSL: 769901391, yUSL: 770001507 },
        lowM15: { xLSL: 395356356, xUSL: 395500356, yLSL: 769774822, yUSL: 769863004 },
        lowM19: { xLSL: 395263941, xUSL: 395332510, yLSL: 769619571, yUSL: 769740168 }
    };

    let allLogData = [];
    let selectedMag = 'highM11';
    let chartX = null;
    let chartY = null;

    // --- LÓGICA DE PROCESAMIENTO ---
    document.getElementById('folderInput').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files).filter(f => f.name.endsWith('.log'));
        allLogData = [];

        for (const file of files) {
            const content = await file.text();
            let type = content.includes("M11") ? "highM11" : (content.includes("M15") ? "lowM15" : "lowM19");
            
            const lines = content.split('\n');
            const headerIdx = lines.findIndex(l => l.includes("NewLocationX(nm)"));
            
            if (headerIdx !== -1 && lines[headerIdx + 1]) {
                const headers = lines[headerIdx].split(',');
                const data = lines[headerIdx + 1].split(',');
                const xIdx = headers.indexOf("NewLocationX(nm)");
                const yIdx = headers.indexOf("NewLocationY(nm)");
                
                if (xIdx !== -1 && yIdx !== -1) {
                    allLogData.push({
                        filename: file.name,
                        x: parseFloat(data[xIdx]),
                        y: parseFloat(data[yIdx]),
                        magType: type
                    });
                }
            }
        }
        allLogData.sort((a, b) => a.filename.localeCompare(b.filename));
        updateView();
    });

    document.getElementById('magPicker').addEventListener('change', (e) => {
        selectedMag = e.target.value;
        updateView();
    });

    function updateView() {
        const filtered = allLogData.filter(d => d.magType === selectedMag);
        const hasData = filtered.length > 0;

        document.getElementById('emptyState').style.display = hasData ? 'none' : 'block';
        document.getElementById('mainContent').style.display = hasData ? 'block' : 'none';
        document.getElementById('pdfBtn').disabled = !hasData;
        document.getElementById('logCount').innerText = `LOGS (${filtered.length})`;

        const tbody = document.getElementById('logTableBody');
        tbody.innerHTML = filtered.map(d => `<tr><td>${d.filename}</td><td>${d.x.toFixed(0)}</td><td>${d.y.toFixed(0)}</td></tr>`).join('');

        if (hasData) {
            renderStats('X', filtered.map(d => d.x));
            renderStats('Y', filtered.map(d => d.y));
            renderChart('chartX', 'X-ray Spot (X)', filtered.map(d => d.x), LIMITS[selectedMag].xLSL, LIMITS[selectedMag].xUSL);
            renderChart('chartY', 'X-ray Spot (Y)', filtered.map(d => d.y), LIMITS[selectedMag].yLSL, LIMITS[selectedMag].yUSL);
        }
    }

    function calculateCPK(values, lsl, usl) {
        const n = values.length;
        const mean = values.reduce((a, b) => a + b, 0) / n;
        const stdDev = Math.sqrt(values.reduce((s, v) => s + Math.pow(v - mean, 2), 0) / n);
        const cpu = (usl - mean) / (3 * stdDev);
        const cpl = (mean - lsl) / (3 * stdDev);
        return { mean, stdDev, cpk: Math.min(cpu, cpl) };
    }

    function getPrinciple(cpk) {
        if (cpk >= 2.0) return { text: "Excellent", bg: "#30d158", col: "#fff" };
        if (cpk >= 1.67) return { text: "Optimal", bg: "#64d2ff", col: "#000" };
        if (cpk >= 1.33) return { text: "Good", bg: "#30d15866", col: "#fff" };
        return { text: "Bad", bg: "#ff453a", col: "#fff" };
    }

    function renderStats(axis, values) {
        const lsl = axis === 'X' ? LIMITS[selectedMag].xLSL : LIMITS[selectedMag].yLSL;
        const usl = axis === 'X' ? LIMITS[selectedMag].xUSL : LIMITS[selectedMag].yUSL;
        const res = calculateCPK(values, lsl, usl);
        const p = getPrinciple(res.cpk);

        document.getElementById(`card${axis}`).innerHTML = `
            <h3>X-RAY SPOT (${axis})</h3>
            <div class="stat-line"><span>Std Deviation</span><span>${res.stdDev.toFixed(4)}</span></div>
            <div class="stat-line"><span>Mean</span><span>${res.mean.toFixed(0)}</span></div>
            <div class="divider"></div>
            <div class="stat-line"><span>LSL</span><span>${lsl.toLocaleString()}</span></div>
            <div class="stat-line"><span>USL</span><span>${usl.toLocaleString()}</span></div>
            <div class="divider"></div>
            <div class="stat-line"><strong>Cpk</strong><span style="font-family: monospace;">${res.cpk.toFixed(12)}</span></div>
            <div class="status-box" style="background:${p.bg}; color:${p.col}">${p.text}</div>
        `;
    }

    function renderChart(canvasId, title, values, lsl, usl) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        const mean = values.reduce((a, b) => a + b, 0) / values.length;
        
        if (canvasId === 'chartX' && chartX) chartX.destroy();
        if (canvasId === 'chartY' && chartY) chartY.destroy();

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: values.map((_, i) => i),
                datasets: [{
                    label: 'Measurement',
                    data: values,
                    borderColor: '#0a84ff',
                    backgroundColor: '#0a84ff33',
                    borderWidth: 2,
                    pointRadius: 4,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: '#38383a' }, ticks: { color: '#8e8e93' } },
                    x: { display: false }
                },
                plugins: {
                    legend: { display: false },
                    annotation: { /* No soportado nativamente sin plugin extra, pero simularemos con draw() */ }
                }
            }
        });
        if (canvasId === 'chartX') chartX = chart; else chartY = chart;
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        doc.text(`SMT Vitrox Report - ${selectedMag}`, 10, 10);
        doc.autoTable({
            html: 'table',
            startY: 20,
            theme: 'grid'
        });
        doc.save(`Reporte_${selectedMag}.pdf`);
    }
</script>
</body>
</html>
