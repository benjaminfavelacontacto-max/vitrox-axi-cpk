<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Vitrox CPK - AXI Final</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --text: #ffffff; --sec: #8e8e93;
            --blue: #0a84ff; --green: #30d158; --red: #ff453a; --border: #38383a;
            --cyan: #64d2ff; --window: #2c2c2e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header {
            background: var(--window); padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border);
        }
        .logo-placeholder { background: white; color: black; padding: 4px 12px; border-radius: 4px; font-weight: bold; margin-right: 20px; }
        select, .btn-top {
            background: #3a3a3c; border: none; color: white; padding: 8px 12px; border-radius: 6px; font-size: 14px; margin-right: 10px; cursor: pointer;
        }
        .btn-blue { background: var(--blue); font-weight: 600; }
        .btn-red { background: var(--red); font-weight: 600; }

        main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 350px; background: #161617; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { background: rgba(255,255,255,0.05); padding: 8px; font-size: 11px; font-weight: bold; color: var(--sec); text-transform: uppercase; }
        .table-wrapper { overflow-y: auto; flex: 1; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; padding: 8px; color: var(--sec); position: sticky; top: 0; background: #161617; }
        td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); }

        .content { flex: 1; overflow-y: auto; padding: 20px; background: #000; }
        .stats-row { display: flex; gap: 20px; margin-bottom: 30px; }
        .stats-card { background: var(--card); border-radius: 12px; padding: 16px; flex: 1; border: 1px solid var(--border); }
        .stat-line { display: flex; justify-content: space-between; font-size: 13px; margin: 6px 0; }
        .stat-line span:first-child { color: var(--sec); }
        .divider { height: 1px; background: var(--border); margin: 10px 0; }
        .status-box { width: 100%; padding: 6px; border-radius: 5px; text-align: center; font-weight: bold; margin-top: 10px; font-size: 12px;}

        .chart-container { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 25px; border: 1px solid var(--border); height: 260px; }
        
        /* MODAL */
        #modalOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal {
            background: var(--card); padding: 25px; border-radius: 15px; width: 400px; border: 1px solid var(--border);
        }
        .modal h2 { margin-top: 0; font-size: 18px; }
        .modal label { display: block; margin-top: 15px; color: var(--sec); font-size: 12px; }
        .modal input {
            width: 100%; background: #2c2c2e; border: 1px solid var(--border); color: white;
            padding: 10px; border-radius: 6px; margin-top: 5px; box-sizing: border-box;
        }
        .modal-buttons { display: flex; gap: 10px; margin-top: 25px; }
        .modal-buttons button { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        
        #folderInput { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-placeholder">SMT</div>
    <div style="flex: 1"></div>
    <select id="magPicker">
        <option value="highM11">High Mag (M11)</option>
        <option value="lowM15">Low Mag (M15)</option>
        <option value="lowM19">Low Mag (M19)</option>
    </select>
    <button class="btn-top btn-blue" onclick="document.getElementById('folderInput').click()">Cargar Carpeta</button>
    <button class="btn-top btn-red" id="pdfBtn" onclick="openPdfModal()" disabled>Descargar PDF</button>
    <input type="file" id="folderInput" webkitdirectory directory multiple>
</header>

<main>
    <div class="sidebar">
        <div class="sidebar-header" id="logCount">LOGS (0)</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>Archivo</th><th>X</th><th>Y</th></tr>
                </thead>
                <tbody id="logTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="content" id="emptyState">
        <div style="text-align: center; margin-top: 150px; color: var(--sec);">
            <h2 style="color: white;">Sin Datos Cargados</h2>
            <p>Selecciona la carpeta de logs para analizar el CPK.</p>
        </div>
    </div>

    <div class="content" id="mainContent" style="display: none;">
        <div class="stats-row">
            <div class="stats-card" id="cardX"></div>
            <div class="stats-card" id="cardY"></div>
            <div class="stats-card" style="max-width: 180px;">
                <h3 style="font-size: 14px; margin-top:0;">Criterios</h3>
                <div id="legend">
                    <div style="font-size:10px; margin-bottom:4px; display:flex; justify-content:space-between;"><span>&ge; 2.0</span><span style="background:#30d158; padding:1px 4px; border-radius:3px; color:white;">Excellent</span></div>
                    <div style="font-size:10px; margin-bottom:4px; display:flex; justify-content:space-between;"><span>&ge; 1.67</span><span style="background:#64d2ff; padding:1px 4px; border-radius:3px; color:black;">Optimal</span></div>
                    <div style="font-size:10px; margin-bottom:4px; display:flex; justify-content:space-between;"><span>&ge; 1.33</span><span style="background:rgba(48,209,88,0.4); padding:1px 4px; border-radius:3px; color:white;">Good</span></div>
                </div>
            </div>
        </div>
        <div class="chart-container"><canvas id="chartX"></canvas></div>
        <div class="chart-container"><canvas id="chartY"></canvas></div>
    </div>
</main>

<div id="modalOverlay">
    <div class="modal">
        <h2>Datos del Reporte</h2>
        <label>Customer Info</label>
        <input type="text" id="pdfCustomer" value="Benchmark Tijuana">
        <label>Machine Model</label>
        <input type="text" id="pdfModel" value="V810Ai S2 XLT M">
        <label>System S/N</label>
        <input type="text" id="pdfSN" value="MY13138446XLT">
        <label>SMTo Engineer</label>
        <input type="text" id="pdfEngineer" value="Juan Cuellar">
        
        <div class="modal-buttons">
            <button style="background:#3a3a3c; color:white;" onclick="closePdfModal()">Cancelar</button>
            <button style="background:var(--red); color:white;" onclick="generatePdf()">Generar PDF</button>
        </div>
    </div>
</div>

<script>
    const LIMITS = {
        highM11: { name: "High Mag (M11)", xLSL: 395265829, xUSL: 395542168, yLSL: 769901391, yUSL: 770001507 },
        lowM15: { name: "Low Mag (M15)", xLSL: 395356356, xUSL: 395500356, yLSL: 769774822, yUSL: 769863004 },
        lowM19: { name: "Low Mag (M19)", xLSL: 395263941, xUSL: 395532510, yLSL: 769619571, yUSL: 769740168 }
    };

    let allLogData = [];
    let selectedMag = 'highM11';
    let charts = {};

    document.getElementById('folderInput').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files).filter(f => f.name.endsWith('.log'));
        allLogData = [];
        for (const file of files) {
            const content = await file.text();
            let type = content.includes("M11") ? "highM11" : (content.includes("M15") ? "lowM15" : "lowM19");
            const lines = content.split('\n');
            const hIdx = lines.findIndex(l => l.includes("NewLocationX(nm)"));
            if (hIdx !== -1 && lines[hIdx+1]) {
                const h = lines[hIdx].split(','), d = lines[hIdx+1].split(',');
                const xi = h.indexOf("NewLocationX(nm)"), yi = h.indexOf("NewLocationY(nm)");
                if (xi !== -1 && yi !== -1) {
                    allLogData.push({ filename: file.name, x: parseFloat(d[xi]), y: parseFloat(d[yi]), magType: type });
                }
            }
        }
        allLogData.sort((a,b) => a.filename.localeCompare(b.filename));
        updateView();
    });

    document.getElementById('magPicker').addEventListener('change', (e) => { selectedMag = e.target.value; updateView(); });

    function updateView() {
        const filtered = allLogData.filter(d => d.magType === selectedMag);
        const hasData = filtered.length > 0;
        document.getElementById('emptyState').style.display = hasData ? 'none' : 'block';
        document.getElementById('mainContent').style.display = hasData ? 'block' : 'none';
        document.getElementById('pdfBtn').disabled = !hasData;
        document.getElementById('logCount').innerText = `LOGS (${filtered.length})`;
        
        document.getElementById('logTableBody').innerHTML = filtered.map(d => `<tr><td>${d.filename}</td><td>${d.x.toFixed(0)}</td><td>${d.y.toFixed(0)}</td></tr>`).join('');
        if (hasData) {
            ['X','Y'].forEach(axis => {
                const vals = filtered.map(d => axis === 'X' ? d.x : d.y);
                const lim = LIMITS[selectedMag];
                const stats = calcStats(vals, axis === 'X' ? lim.xLSL : lim.yLSL, axis === 'X' ? lim.xUSL : lim.yUSL);
                renderStatsUI(axis, stats, lim);
                renderChart(`chart${axis}`, `X-ray Spot (${axis})`, vals, axis === 'X' ? lim.xLSL : lim.yLSL, axis === 'X' ? lim.xUSL : lim.yUSL);
            });
        }
    }

    function calcStats(v, lsl, usl) {
        const n = v.length, mean = v.reduce((a,b)=>a+b,0)/n;
        const sd = Math.sqrt(v.reduce((s,x)=>s+Math.pow(x-mean,2),0)/(n-1));
        const cpk = Math.min((usl-mean)/(3*sd), (mean-lsl)/(3*sd));
        return { mean, sd, cpk };
    }

    function getP(cpk) {
        if (cpk >= 2) return { t: "Excellent", b: "#30d158", c: "#fff" };
        if (cpk >= 1.67) return { t: "Optimal", b: "#64d2ff", c: "#000" };
        if (cpk >= 1.33) return { t: "Good", b: "rgba(48,209,88,0.4)", c: "#fff" };
        return { t: "Bad", b: "#ff453a", c: "#fff" };
    }

    function renderStatsUI(ax, s, l) {
        const p = getP(s.cpk), lsl = ax === 'X' ? l.xLSL : l.yLSL, usl = ax === 'X' ? l.xUSL : l.yUSL;
        document.getElementById(`card${ax}`).innerHTML = `
            <h3 style="margin:0 0 10px 0; font-size:14px;">X-RAY SPOT (${ax})</h3>
            <div class="stat-line"><span>Std Deviation</span><span>${s.sd.toFixed(4)}</span></div>
            <div class="stat-line"><span>Mean</span><span>${s.mean.toFixed(0)}</span></div>
            <div class="divider"></div>
            <div class="stat-line"><span>LSL</span><span>${lsl.toLocaleString()}</span></div>
            <div class="stat-line"><span>USL</span><span>${usl.toLocaleString()}</span></div>
            <div class="divider"></div>
            <div class="stat-line"><strong>Cpk</strong><span style="font-family:monospace;">${s.cpk.toFixed(12)}</span></div>
            <div class="status-box" style="background:${p.b}; color:${p.c}">${p.t}</div>
        `;
    }

    function renderChart(id, title, v, lsl, usl) {
        if (charts[id]) charts[id].destroy();
        const ctx = document.getElementById(id).getContext('2d');
        charts[id] = new Chart(ctx, {
            type: 'line',
            data: { labels: v.map((_,i)=>i), datasets: [{ data: v, borderColor: '#0a84ff', backgroundColor: '#0a84ff22', borderWidth: 2, pointRadius: 3, tension: 0.2 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#38383a' }, ticks: { color: '#8e8e93', font: { size: 9 } } } }, plugins: { legend: { display: false } } }
        });
    }

    function openPdfModal() { document.getElementById('modalOverlay').style.display = 'flex'; }
    function closePdfModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    function generatePdf() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const filtered = allLogData.filter(d => d.magType === selectedMag);
        const lim = LIMITS[selectedMag];
        
        const cust = document.getElementById('pdfCustomer').value;
        const mod = document.getElementById('pdfModel').value;
        const sn = document.getElementById('pdfSN').value;
        const eng = document.getElementById('pdfEngineer').value;

        doc.setFontSize(10);
        doc.autoTable({
            body: [['Customer Info.', cust], ['Machine Model', mod], ['System S/N', sn], ['SMTo Engineer', eng]],
            startY: 15, theme: 'grid', styles: { cellPadding: 1.5, fontSize: 10 }, columnStyles: { 0: { fontStyle: 'bold', width: 45 } }
        });

        const statsX = calcStats(filtered.map(d=>d.x), lim.xLSL, lim.xUSL);
        const statsY = calcStats(filtered.map(d=>d.y), lim.yLSL, lim.yUSL);
        
        doc.setFont("helvetica", "bold"); doc.setFontSize(14);
        doc.text(`${lim.name}`, 15, doc.lastAutoTable.finalY + 15);
        
        doc.autoTable({
            head: [['Statistic', 'X-Ray Spot (X)', 'X-Ray Spot (Y)']],
            body: [
                ['Standard Deviation', statsX.sd.toFixed(4), statsY.sd.toFixed(4)],
                ['Mean', statsX.mean.toFixed(0), statsY.mean.toFixed(0)],
                ['USL', lim.xUSL.toLocaleString(), lim.yUSL.toLocaleString()],
                ['LSL', lim.xLSL.toLocaleString(), lim.yLSL.toLocaleString()],
                ['Cpk', statsX.cpk.toFixed(12), statsY.cpk.toFixed(12)],
                ['Principle', getP(statsX.cpk).t, getP(statsY.cpk).t]
            ],
            startY: doc.lastAutoTable.finalY + 20,
            theme: 'grid',
            headStyles: { fillColor: [0, 0, 0], textColor: [255, 255, 255] },
            styles: { fontSize: 10, cellPadding: 2 }
        });

        doc.save(`Vitrox_Report_${selectedMag}.pdf`);
        closePdfModal();
    }
</script>
</body>
</html>
