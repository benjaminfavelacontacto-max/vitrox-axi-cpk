<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrox Analytics Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --text: #ffffff; --sec: #8e8e93;
            --blue: #0a84ff; --green: #30d158; --red: #ff453a; --border: #38383a;
        }
        body {
            font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }
        .container { width: 100%; max-width: 500px; margin-top: 40px; }
        .card { background: var(--card); border-radius: 14px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border); }
        h1 { font-size: 28px; font-weight: 600; text-align: center; margin-bottom: 5px; }
        .subtitle { color: var(--sec); text-align: center; margin-bottom: 30px; font-size: 14px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input { background: #2c2c2e; border: none; border-radius: 8px; padding: 12px; color: white; width: 100%; box-sizing: border-box; }
        label { display: block; color: var(--sec); font-size: 11px; text-transform: uppercase; margin-bottom: 5px; }
        .upload-zone { 
            border: 2px dashed var(--border); border-radius: 12px; padding: 30px; text-align: center; 
            position: relative; cursor: pointer; transition: 0.2s;
        }
        .upload-zone:hover { border-color: var(--blue); background: rgba(10,132,255,0.1); }
        #folderInput { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .cpk-val { font-size: 54px; font-weight: 700; text-align: center; margin: 15px 0; letter-spacing: -2px; }
        .btn { 
            width: 100%; background: var(--blue); color: white; border: none; border-radius: 12px; 
            padding: 15px; font-weight: 600; cursor: pointer; margin-top: 15px;
        }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: #2c2c2e; padding: 12px; border-radius: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vitrox Analytics</h1>
        <div class="subtitle">Análisis de Capacidad de Proceso</div>
        
        <div class="card">
            <div class="input-row">
                <div><label>LSL</label><input type="number" id="lsl" value="10"></div>
                <div><label>USL</label><input type="number" id="usl" value="100"></div>
            </div>
            <div class="upload-zone">
                <span id="txt">Seleccionar Carpeta de Logs</span>
                <input type="file" id="folderInput" webkitdirectory directory multiple>
            </div>
        </div>

        <div class="card" id="res" style="display:none">
            <div style="text-align:center; color:var(--sec); font-size:12px">CPK CALCULADO</div>
            <div id="cpkDisp" class="cpk-val">-</div>
            <div class="stats">
                <div class="stat-box"><label>Media</label><span id="m"></span></div>
                <div class="stat-box"><label>Sigma</label><span id="s"></span></div>
                <div class="stat-box"><label>Muestras</label><span id="n"></span></div>
                <div class="stat-box"><label>Archivos</label><span id="f"></span></div>
            </div>
            <button class="btn" onclick="downloadPDF()">Descargar Reporte PDF</button>
        </div>
    </div>

    <script>
        let reportData = {};
        document.getElementById('folderInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files).filter(f => f.name.match(/\.(log|csv|txt)$/i));
            if (!files.length) return alert("No hay archivos válidos");
            
            document.getElementById('txt').innerText = `Procesando ${files.length} archivos...`;
            let data = [];
            for (const f of files) {
                const text = await f.text();
                const matches = text.match(/-?\d+\.\d+/g);
                if (matches) data.push(...matches.map(Number));
            }

            const usl = parseFloat(document.getElementById('usl').value);
            const lsl = parseFloat(document.getElementById('lsl').value);
            const n = data.length;
            const mean = data.reduce((a, b) => a + b, 0) / n;
            const sigma = Math.sqrt(data.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / (n - 1));
            const cpk = Math.min((usl - mean)/(3*sigma), (mean - lsl)/(3*sigma));

            reportData = { cpk: cpk.toFixed(4), mean: mean.toFixed(4), sigma: sigma.toFixed(4), n, files: files.length, usl, lsl };
            
            document.getElementById('res').style.display = 'block';
            document.getElementById('cpkDisp').innerText = reportData.cpk;
            document.getElementById('cpkDisp').style.color = cpk >= 1.33 ? 'var(--green)' : 'var(--red)';
            document.getElementById('m').innerText = reportData.mean;
            document.getElementById('s').innerText = reportData.sigma;
            document.getElementById('n').innerText = n;
            document.getElementById('f').innerText = files.length;
            document.getElementById('txt').innerText = "Carpeta Cargada";
        });

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Reporte Vitrox AXI", 20, 20);
            doc.autoTable({
                startY: 30,
                body: [
                    ["CPK", reportData.cpk], ["Media", reportData.mean], ["Sigma", reportData.sigma],
                    ["LSL", reportData.lsl], ["USL", reportData.usl], ["Muestras", reportData.n]
                ]
            });
            doc.save("Reporte_CPK.pdf");
        }
    </script>
</body>
</html>
